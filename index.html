<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/mini-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Kafu People helps startups and growing businesses ship AI-powered products, cloud-native apps, and full-stack MVPs — from idea to production."
    />
    <meta property="og:title" content="Kafu People | AI, Cloud & Full-Stack Development" />
    <meta
      property="og:description"
      content="Kafu People helps startups and growing businesses ship AI-powered products, cloud-native apps, and full-stack MVPs."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kafupeople.com/" />
    <meta property="og:image" content="https://kafupeople.com/images/kafupeople.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#1E4FD4" />
    <title>Kafu People | AI, Cloud & Full-Stack Development</title>

    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 99999;
      }

      .loader-wrapper {
        position: relative;
        width: 250px;
        height: 250px;
      }

      .spinner {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 2px solid transparent;
        border-left-color: #0f2d52;
        border-right-color: #7c3aed;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .logo-container {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-container img {
        width: 112px;
        max-width: 55%;
        height: auto;
        object-fit: contain;
        animation: bounce 1.5s infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes bounce {
        0%, 20%, 50%, 80%, 100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-12px);
        }
        60% {
          transform: translateY(-6px);
        }
      }
    </style>
  </head>

  <body>
    <div id="initial-loader">
      <div class="loader-wrapper">
        <div class="spinner"></div>

        <div class="logo-container">
          <img src="/images/kafupeople.webp" alt="Kafu People" />
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
